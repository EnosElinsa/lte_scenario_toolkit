profile:
  id: new-york-default
  display_name: New York City default
  scenario_id: new-york-city

inputs:
  points_dataset_id: usa_clear_lte_base_stations

experiment:
  random_seed: 42

spatial:
  target_crs: EPSG:3857
  rectangle_size_m: 3000
  target_base_station_count: 30
  count_tolerance: 0

scan:
  mode: fast
  strategy: uniform
  step_m: 10
  max_rectangles: 100
  minimum_center_spacing_m: 3000

outputs:
  root: results
  save_csv: true
  save_preview_png: true
  save_terrain_png: true
  save_terrain_eps: true
  save_terrain_html: true

figures:
  preset: publication
  colormap: terrain
  dpi: 300
  azimuth_deg: -60.0
  elevation_deg: 30.0
  vertical_exaggeration: 1.0
  station_color: red
  station_marker_size: 20.0
  title: null
