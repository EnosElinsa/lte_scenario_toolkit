name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source without large research data
        uses: actions/checkout@v7
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,gui]"

      - name: Static checks
        run: python -m ruff check src scripts tests

      - name: Entry-point syntax checks
        run: python -m compileall -q src/lte_scenario_toolkit scripts

      - name: Fixture and unit tests
        run: python -m pytest -q
